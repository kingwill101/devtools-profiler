name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format_and_analyze:
    name: Format and Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          dart --version

      - name: Get workspace dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze workspace
        run: dart analyze .

  test_packages:
    name: Test ${{ matrix.package }}
    needs: format_and_analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/devtools_profiler_protocol
          - packages/devtools_region_profiler
          - packages/devtools_profiler_core
          - packages/devtools_profiler_cli

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          dart --version

      - name: Get workspace dependencies
        run: dart pub get

      - name: Run package tests
        run: dart test ${{ matrix.package }}
